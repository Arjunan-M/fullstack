<!DOCTYPE html>
<html>
<head>
    <title>Form Validation</title>
    <style>
        body 
        { 
            font-family: Arial;
            background: #e6ffe6;
            text-align: center; 
            padding: 20px;
         }
        input, textarea 
        { 
            padding: 8px; 
            margin: 10px; 
            width: 250px; 
            border: 1px solid #ccc; 
            border-radius: 4px; 
        }
        #error { 
            color: red; 
            font-weight: bold; 
            min-height: 20px; 
        }
        button 
        { 
            padding: 10px 20px; 
            cursor: pointer;
             background: #4CAF50; 
             color: white; 
             border: none; 
             border-radius: 4px; 
        }
    </style>
</head>
<body>

<h2>Form Validation</h2>

<form onsubmit="return validate()">
    <input id="name" placeholder="Enter Name"><br>
    <input id="email" placeholder="Enter Email"><br>
    <input id="phone" placeholder="Enter Phone (10 digits)"><br>
    <input id="dob" type="date"><br>
    <textarea id="comment" placeholder="Your Comments"></textarea><br>
    <button>Submit</button>
</form>

<p id="error"></p>

<script>
    function validate() {
        const name = document.getElementById("name").value;
        const email = document.getElementById("email").value;
        const phone = document.getElementById("phone").value;
        const dob = document.getElementById("dob").value;
        const error = document.getElementById("error");


        const emailPattern = /^[a-z0-9]+@[a-z]+\.[a-z]+$/;
 
        const phonePattern = /^\d{10}$/;

        if (name === "") {
            error.innerText = "Name is required!";
            return false;
        }
        if (!emailPattern.test(email)) {
            error.innerText = "Please enter a valid email address!";
            return false;
        }
        if (!phonePattern.test(phone)) {
            error.innerText = "Phone must be 10 digits!";
            return false;
        }
        if (dob === "") {
            error.innerText = "Date of Birth is required!";
            return false;
        }

        error.innerText = ""; 
        alert("Form submitted successfully!");
        return true;
    }
</script>

</body>
</html>

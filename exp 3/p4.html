<!DOCTYPE html>
<html>
<head>
    <title>15 Puzzle Game</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            text-align: center;
        }

        table {
            margin: auto;
            border-collapse: collapse;
        }

        td {
            width: 70px;
            height: 70px;
            border: 2px solid #333;
            font-size: 20px;
            cursor: pointer;
            background: #3498db;
            color: white;
        }

        .empty {
            background: white;
            cursor: default;
        }
    </style>
</head>

<body>

<h2>15 Puzzle Game</h2>

<table id="board"></table>

<script>
    const winningState = [...Array(15).keys()].map(i => i + 1).concat("");
    let nums = [...winningState];
    nums.sort(() => Math.random() - 0.5);

    let t = document.getElementById("board");

    function draw() {
        t.innerHTML = "";
        nums.forEach((n, i) => {
            if (i % 4 === 0) t.insertRow();
            let c = t.rows[t.rows.length - 1].insertCell();
            c.innerText = n;
            c.onclick = () => move(i);
            if (n === "") c.className = "empty";
        });
    }

    function move(i) {
        let e = nums.indexOf("");
        let row = Math.floor(i / 4);
        let eRow = Math.floor(e / 4);
        
        if ([i - 1, i + 1, i - 4, i + 4].includes(e)) {
            if ((i - 1 === e || i + 1 === e) && row !== eRow) return;

            [nums[i], nums[e]] = [nums[e], nums[i]];
            draw();
            checkWin();
        }
    }

    function checkWin() {
        const isWin = nums.every((val, index) => val === winningState[index]);
        if (isWin) {
            setTimeout(() => alert("Congratulations! You solved the puzzle!"), 100);
        }
    }

    draw();
</script>


</body>
</html>
